services:
  # ===== WEB SERVICE =====
  - type: web
    name: market-app
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -c "from app import app, db; db.create_all()"
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USE_TLS
        sync: false
      - key: MAIL_USE_SSL
        sync: false
      - key: MAIL_DEBUG
        sync: false
      - key: MAIL_SUPPRESS_SEND
        sync: false
      - key: PYTHON_VERSION
        value: 3.9.0

  # ===== POSTGRESQL DATABASE =====
  - type: postgres
    name: market-db
    plan: free
    database: market_db
    user: market_user