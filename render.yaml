# render.yaml
services:
  - type: web
    name: market-app
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -c "from app import app, db; db.create_all()"
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.9.0

  - type: postgresql
    name: market-db
    ipAllowList: []
    plan: free
    maxConnections: 10
    database: market_db
    user: market_user