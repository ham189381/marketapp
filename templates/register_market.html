{% extends "base.html" %}

{% block title %}Register Market{% endblock %}

{% block extra_css %}
<style>
    .camera-container {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 15px;
    }
    .camera-container video {
        width: 100%;
        max-height: 200px;
        background: #000;
        border-radius: 4px;
    }
    .preview-image {
        max-width: 100%;
        max-height: 150px;
        border-radius: 4px;
        border: 2px solid #28a745;
        margin-top: 10px;
    }
    .preview-video {
        max-width: 100%;
        max-height: 150px;
        border-radius: 4px;
        margin-top: 10px;
    }
    .required-field::after {
        content: " *";
        color: red;
    }
    .optional-field::after {
        content: " (Optional)";
        color: #6c757d;
        font-weight: normal;
        font-size: 0.9em;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Register a Market</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" id="registerForm">
                    <!-- Basic Information -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label required-field">Market Name</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   required maxlength="100" placeholder="Enter market name">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="market_type" class="form-label required-field">Market Type</label>
                            <select class="form-select" id="market_type" name="market_type" required>
                                <option value="supermarket">Supermarket</option>
                                <option value="local">Local Market</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="district" class="form-label required-field">District</label>
                            <input type="text" class="form-control" id="district" name="district" 
                                   required placeholder="Enter district">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="town" class="form-label required-field">Town</label>
                            <input type="text" class="form-control" id="town" name="town" 
                                   required placeholder="Enter town">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label required-field">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone" 
                                   required placeholder="Enter phone number">
                            <small class="text-muted">Format: 07XXXXXXXX or +256XXXXXXXXX</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label optional-field">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   placeholder="Enter email for order notifications">
                            <small class="text-muted">Provide an email to receive order notifications</small>
                        </div>
                    </div>

                    <hr>

                    <!-- Image Capture -->
                    <h5 class="mb-3"><i class="fas fa-camera text-primary"></i> Images</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="camera-container">
                                <h6 class="text-center">Image 1</h6>
                                <video id="video" autoplay playsinline></video>
                                <div class="text-center mt-2">
                                    <button type="button" class="btn btn-primary btn-sm" onclick="captureImage('image1_data')">
                                        <i class="fas fa-camera"></i> Capture
                                    </button>
                                    <button type="button" class="btn btn-secondary btn-sm" onclick="clearImage('image1_preview', 'image1_data')">
                                        <i class="fas fa-trash"></i> Clear
                                    </button>
                                </div>
                                <input type="hidden" id="image1_data" name="image1_data">
                                <div id="image1_preview" class="text-center"></div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="camera-container">
                                <h6 class="text-center">Image 2</h6>
                                <video id="video2" autoplay playsinline></video>
                                <div class="text-center mt-2">
                                    <button type="button" class="btn btn-primary btn-sm" onclick="captureImage('image2_data')">
                                        <i class="fas fa-camera"></i> Capture
                                    </button>
                                    <button type="button" class="btn btn-secondary btn-sm" onclick="clearImage('image2_preview', 'image2_data')">
                                        <i class="fas fa-trash"></i> Clear
                                    </button>
                                </div>
                                <input type="hidden" id="image2_data" name="image2_data">
                                <div id="image2_preview" class="text-center"></div>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Or Upload Image 1</label>
                            <input type="file" class="form-control" name="image1" accept="image/*">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Or Upload Image 2</label>
                            <input type="file" class="form-control" name="image2" accept="image/*">
                        </div>
                    </div>

                    <hr>

                    <!-- Video Capture -->
                    <h5 class="mb-3"><i class="fas fa-video text-danger"></i> Video</h5>
                    <div class="camera-container mb-3">
                        <video id="video3" autoplay playsinline></video>
                        <div class="text-center mt-2">
                            <button type="button" class="btn btn-danger btn-sm" id="startVideoBtn">
                                <i class="fas fa-circle"></i> Start Recording
                            </button>
                            <button type="button" class="btn btn-warning btn-sm" id="stopVideoBtn" style="display: none;">
                                <i class="fas fa-stop"></i> Stop Recording
                            </button>
                            <button type="button" class="btn btn-secondary btn-sm" onclick="clearVideo()">
                                <i class="fas fa-trash"></i> Clear
                            </button>
                        </div>
                        <input type="hidden" id="video_data" name="video_data">
                        <div id="video_preview" class="text-center"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Or Upload Video</label>
                        <input type="file" class="form-control" name="video" accept="video/*">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-check"></i> Register Market
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        initializeCamera('video');
        initializeCamera('video2');
        initializeCamera('video3');
        setupVideoRecording();
    });
</script>
{% endblock %}
