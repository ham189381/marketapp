<!-- templates/market_orders.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders for {{ market.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="bi bi-shop"></i> Market App
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-list-ul"></i> 
                Orders for {{ market.name }}
            </h2>
            <a href="{{ url_for('market_detail', market_id=market.id) }}" class="btn btn-primary">
                <i class="bi bi-arrow-left"></i> Back to Market
            </a>
        </div>

        {% if orders %}
            <div class="list-group">
                {% for order in orders %}
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">{{ order.customer_name }}</h5>
                                <p class="mb-1">{{ order.items_needed }}</p>
                                <small class="text-muted">
                                    {{ order.created_at.strftime('%Y-%m-%d %H:%M') }}
                                </small>
                            </div>
                            <span class="badge bg-{{ 'success' if order.status == 'completed' else 'warning' if order.status == 'pending' else 'secondary' }}">
                                {{ order.status }}
                            </span>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info">
                No orders for this market yet.
            </div>
        {% endif %}
    </div>
</body>
</html>
